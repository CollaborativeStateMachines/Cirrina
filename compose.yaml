services:
  influxdb:
    image: "influxdb:2"
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=csm
      - DOCKER_INFLUXDB_INIT_PASSWORD=csm
      - DOCKER_INFLUXDB_INIT_ORG=csm
      - DOCKER_INFLUXDB_INIT_BUCKET=csm
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=csm
  nats:
    image: "nats:latest"
    command:
      - "-js"
    ports:
      - "4222:4222"
      - "6222:6222"
  etcd:
    image: "quay.io/coreos/etcd:v3.5.7"
    container_name: "etcd"
    ports:
      - "2379:2379"
    command:
      - "/usr/local/bin/etcd"
      - "--name"
      - "s1"
      - "--listen-client-urls"
      - "http://0.0.0.0:2379"
      - "--advertise-client-urls"
      - "http://0.0.0.0:2379"