services:
  etcd:
    image: "quay.io/coreos/etcd:v3.5.7"
    container_name: "etcd"
    ports:
      - "2379:2379"
    command:
      - "/usr/local/bin/etcd"
      - "--name"
      - "s1"
      - "--listen-client-urls"
      - "http://0.0.0.0:2379"
      - "--advertise-client-urls"
      - "http://0.0.0.0:2379"