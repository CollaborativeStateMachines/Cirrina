syntax = "proto3";

package exchange;

import "ContextVariable.proto";

option java_multiple_files = false;
option java_package = "at.ac.uibk.dps.cirrina.execution.object.exchange";
option java_outer_classname = "EventProtos";

message Event {
  enum Channel {
    INTERNAL = 0;
    EXTERNAL = 1;
    GLOBAL = 2;
    PERIPHERAL = 3;
  }

  string topic = 1;
  Channel channel = 2;
  repeated ContextVariable data = 3;
  string target = 4;
  string source = 5;
  string id = 6;
  int64 createdTime = 7;
}